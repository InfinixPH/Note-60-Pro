<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infinix NOTE60Pro – You Do Note</title>

<link href="https://fonts.cdnfonts.com/css/hk-modular" rel="stylesheet">
<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>
:root{
  --accent:#ff6a00;
  --accent2:#ff9b3d;
  --glass:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.16);
  --radius:24px;
  --shadow:0 30px 100px rgba(0,0,0,0.85);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:#fff;
  overflow:hidden;
  background:#000;
}

/* BACKGROUND */

.bg{
  position:fixed;
  inset:-25%;
  z-index:-3;
  background:
    radial-gradient(980px 620px at 78% 12%, rgba(255,220,140,0.42), transparent 62%),
    radial-gradient(980px 680px at 20% 18%, rgba(255,140,0,0.34), transparent 60%),
    radial-gradient(820px 720px at 55% 92%, rgba(255,90,0,0.22), transparent 65%),
    linear-gradient(180deg,#0b0705,#050505,#000);
  animation:bgFloat 12s ease-in-out infinite alternate;
}

@keyframes bgFloat{
  0%{ transform:translate3d(-1.2%, -1%, 0) scale(1.03); }
  100%{ transform:translate3d(1.2%, 1%, 0) scale(1.08); }
}

.grain{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
  opacity:0.07;
}

.particles{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* APP */

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:30;
  backdrop-filter: blur(18px);
  background: linear-gradient(to bottom, rgba(0,0,0,0.88), rgba(0,0,0,0.55));
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.header-bar{
  max-width:980px;
  margin:0 auto;
  padding:14px 16px 12px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}

.brand{
  font-size:13px;
  letter-spacing:1px;
  opacity:.75;
}

.product{
  margin-top:4px;
  font-size:26px;
  font-weight:900;
}

.header-tag{
  font-family:'MoonTime', cursive;
  font-size:34px;
  color:var(--accent2);
}

.header-hint{
  margin-top:6px;
  font-size:10px;
  opacity:.6;
}

/* MAIN */

main{
  flex:1;
  display:flex;
  justify-content:center;
  padding:12px 16px 16px;
}

.wrap{
  width:100%;
  max-width:980px;
  display:flex;
  flex-direction:column;
}

/* POSTER CARD */

.poster-card{
  flex:1;
  border-radius:var(--radius);
  overflow:hidden;
  background:var(--glass);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  backdrop-filter: blur(16px);
}

.poster-scroll{
  height:100%;
  overflow-y:auto;
  background:#000;
}

.poster-img{
  width:100%;
  height:auto;
  display:block;
}

/* IMAGE WRAPPER FOR CLICKABLE LINK */

.poster-image-wrapper{
  position:relative;
}

/* CLICKABLE LINK AREA */

.retail-link{
  position:absolute;

  /* Adjust if needed */
  bottom:80px;
  left:110px;
  width:600px;
  height:80px;

  cursor:pointer;
}

.retail-link:hover{
  outline:2px solid rgba(255,255,255,0.3);
}

/* FOOTER */

footer{
  border-top:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.55));
}

.footer-wrap{
  max-width:980px;
  margin:0 auto;
  padding:10px;
  text-align:center;
  font-size:12px;
  opacity:.72;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<header>
  <div class="header-bar">
    <div>
      <div class="brand">Infinix</div>
      <div class="product">NOTE60Pro</div>
    </div>

    <div style="text-align:right">
      <div class="header-tag">You Do Note</div>
      <div class="header-hint">scroll inside the mechanics</div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">

    <section class="poster-card">

      <div class="poster-scroll">

        <div class="poster-image-wrapper">

          <img class="poster-img"
          src="./FULLMECHANICS.png"
          alt="Infinix NOTE60Pro Mechanics">

          <!-- CLICKABLE AREA -->
          <a class="retail-link"
          href="https://docs.google.com/spreadsheets/d/17UxQgoIH_DI43Lz1tN6ThTgRVI48D9XE/edit?usp=sharing"
          target="_blank"></a>

        </div>

      </div>

    </section>

  </div>
</main>

<footer>
  <div class="footer-wrap">
  © Infinix Promo • NOTE60Pro Campaign
  </div>
</footer>

</div>

</body>
</html>
