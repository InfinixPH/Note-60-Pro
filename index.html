<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Infinix Note 60 Pro – You Do Note</title>

<!-- Load MoonTime font (web) -->
<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>
:root{
  --accent:#ff6a00;
  --accent2:#ff9b3d;
  --bg:#050505;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.15);
  --radius:20px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:#fff;
  overflow:hidden;

  /* ORANGE "iPhone-style" background */
  background:
    radial-gradient(900px 600px at 80% 20%, rgba(255,120,0,0.35), transparent 60%),
    radial-gradient(1000px 700px at 10% 10%, rgba(255,80,0,0.25), transparent 55%),
    linear-gradient(180deg,#000,#050505);
}

.app{
  height:100vh;
  height:100dvh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter:blur(18px);
  background:linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.6));
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.header-wrap{
  max-width:980px;
  margin:auto;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header-title{
  font-weight:800;
  font-size:16px;
  letter-spacing:0.5px;
}

.header-tag{
  font-size:18px;
  color:var(--accent2);
  font-family:"MoonTime", cursive; /* ✅ Moontime */
  font-weight:400;
  letter-spacing:0.2px;
}

/* MAIN */
main{
  flex:1;
  min-height:0;
  display:flex;
  justify-content:center;
  padding:16px;
}

.wrap{
  width:100%;
  max-width:980px;
  min-height:0;
  display:flex;
  flex-direction:column;
}

.poster-card{
  flex:1;
  min-height:0;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  backdrop-filter:blur(14px);
  overflow:hidden;
  display:flex;
  flex-direction:column;

  box-shadow:
    0 30px 80px rgba(0,0,0,0.8),
    0 0 60px rgba(255,110,0,0.25);
}

.poster-scroll{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  background:#000;

  scrollbar-width:none;
  -ms-overflow-style:none;
}
.poster-scroll::-webkit-scrollbar{display:none}

.poster-img{
  width:100%;
  height:auto;
  display:block;
}

/* FOOTER */
footer{
  border-top:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  background:linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.6));
}
.footer-wrap{
  max-width:980px;
  margin:auto;
  padding:10px 16px 12px;
  text-align:center;
  font-size:12px;
  opacity:.7;
}

@media (max-width:520px){
  .header-title{font-size:14px}
  .header-tag{font-size:16px}
  main{padding:12px}
}
</style>
</head>

<body>
<div class="app">

<header>
  <div class="header-wrap">
    <div class="header-title">Infinix Note 60 Pro</div>
    <div class="header-tag">You Do Note</div>
  </div>
</header>

<main>
  <div class="wrap">
    <section class="poster-card">
      <div class="poster-scroll">
        <img
          class="poster-img"
          src="./FULLMECHANICS.png"
          alt="Infinix Note 60 Pro Mechanics"
          loading="eager"
        />
      </div>
    </section>
  </div>
</main>

<footer>
  <div class="footer-wrap">© Infinix Promo • Note 60 Pro Campaign</div>
</footer>

</div>
</body>
</html>
