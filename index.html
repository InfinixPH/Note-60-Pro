<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infinix NOTE60Pro</title>

<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>

:root{
--accent:#ff6a00;
--accent2:#ff9b3d;
--card:#0c0c0c;
--border:#1d1d1d;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:#fff;

background:
radial-gradient(circle at 80% 20%, rgba(255,120,0,0.25), transparent 40%),
radial-gradient(circle at 20% 90%, rgba(255,80,0,0.2), transparent 40%),
#000;

overflow:auto;
}

/* HEADER */

header{
text-align:center;
padding:40px 20px 20px;
}

.header-brand{
font-size:18px;
opacity:.7;
letter-spacing:2px;
}

.header-product{
font-size:48px;
font-weight:900;
letter-spacing:1px;
margin-top:4px;
}

.header-tag{
font-family:'MoonTime',cursive;
font-size:46px;
color:var(--accent2);
margin-top:6px;
}

.header-hint{
font-size:11px;
opacity:.6;
margin-top:6px;
}

/* MAIN */

main{
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:950px;
position:relative;
}

/* POSTER */

.poster-card{
background:var(--card);
border:1px solid var(--border);
border-radius:24px;
overflow:hidden;
box-shadow:0 30px 60px rgba(0,0,0,.7);
}

.poster-scroll{
max-height:72vh;
overflow-y:auto;
background:#000;
}

/* SCROLLBAR */

.poster-scroll::-webkit-scrollbar{
width:10px;
}

.poster-scroll::-webkit-scrollbar-track{
background:#111;
}

.poster-scroll::-webkit-scrollbar-thumb{
background:linear-gradient(#ff6a00,#ff9b3d);
border-radius:10px;
}

.poster-img{
width:100%;
display:block;
}

/* YUNA */

.yuna{
position:absolute;
right:-60px;
bottom:-20px;
height:420px;
pointer-events:none;
opacity:.95;
}

/* FOOTER */

footer{
text-align:center;
padding:16px;
font-size:12px;
opacity:.6;
}

/* MOBILE */

@media(max-width:768px){

.header-product{
font-size:36px;
}

.header-tag{
font-size:34px;
}

.yuna{
height:260px;
right:-20px;
}

}

</style>

</head>

<body>

<header>

<div class="header-brand">
Infinix
</div>

<div class="header-product">
NOTE60Pro
</div>

<div class="header-tag">
You Do Note
</div>

<div class="header-hint">
scroll inside the mechanics
</div>

</header>

<main>

<div class="container">

<div class="poster-card">

<div class="poster-scroll">

<img
class="poster-img"
src="FULLMECHANICS.png"
alt="NOTE60Pro Mechanics">

</div>

</div>

<img
class="yuna"
src="YUNA_STANDEE.png"
alt="Yuna Standee">

</div>

</main>

<footer>
© Infinix Promo • NOTE60Pro Campaign
</footer>

</body>
</html>
