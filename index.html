<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infinix Note 60 Pro – You Do Note</title>

<!-- HK MODULAR -->

<link href="https://fonts.cdnfonts.com/css/hk-modular" rel="stylesheet">

<!-- MOONTIME -->

<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>

:root{
--accent:#ff6a00;
--accent2:#ff9b3d;
--card:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.16);
--radius:22px;
--shadow:0 30px 90px rgba(0,0,0,0.85);
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
height:100%;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:#fff;
overflow:hidden;
background:#000;
}

/* ===== Animated Premium Background ===== */

.bg{
position:fixed;
inset:-20%;
z-index:-2;

background:
radial-gradient(900px 600px at 75% 15%, rgba(255,120,0,0.50), transparent 62%),
radial-gradient(900px 700px at 20% 20%, rgba(255,80,0,0.30), transparent 60%),
radial-gradient(700px 500px at 60% 80%, rgba(255,160,80,0.22), transparent 60%),
linear-gradient(180deg,#000,#070707);

animation:bgFloat 12s ease-in-out infinite alternate;
}

@keyframes bgFloat{
0%{ transform:translate3d(-1%, -1%, 0) scale(1.02); }
100%{ transform:translate3d(1%, 1%, 0) scale(1.06); }
}

/* ===== Layout ===== */

.app{
height:100vh;
height:100dvh;
display:flex;
flex-direction:column;
}

/* ===== Header ===== */

header{
position:sticky;
top:0;
z-index:20;

backdrop-filter:blur(18px);

background:linear-gradient(
to bottom,
rgba(0,0,0,0.92),
rgba(0,0,0,0.55)
);

border-bottom:1px solid rgba(255,255,255,0.08);
}

.header-wrap{
max-width:980px;
margin:auto;
padding:22px;

display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

/* HK MODULAR TITLE */

.header-title{
font-family:'HK Modular', sans-serif;
font-weight:900;
font-size:34px;
letter-spacing:1px;

background:linear-gradient(180deg,#fff,#d9d9d9);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
}

/* MOONTIME TAGLINE */

.header-tag{
font-family:'MoonTime', cursive;
font-size:42px;
color:var(--accent2);

text-shadow:
0 0 20px rgba(255,120,0,0.35),
0 0 40px rgba(255,120,0,0.25);
}

.header-hint{
font-size:12px;
opacity:.7;
letter-spacing:.4px;
}

/* ===== Main ===== */

main{
flex:1;
min-height:0;

display:flex;
justify-content:center;

padding:16px;
}

.wrap{
width:100%;
max-width:980px;
display:flex;
flex-direction:column;
}

/* Premium Card */

.poster-card{
flex:1;
min-height:0;

background:var(--card);
border:1px solid var(--border);

border-radius:var(--radius);

box-shadow:var(--shadow);

backdrop-filter:blur(14px);

overflow:hidden;
}

/* ===== Scroll Area ===== */

.poster-scroll{
height:100%;

overflow-y:auto;
overflow-x:hidden;

background:#000;

scrollbar-width:thin;
scrollbar-color:#ff6a00 #111;
}

/* Chrome Scrollbar */

.poster-scroll::-webkit-scrollbar{
width:10px;
}

.poster-scroll::-webkit-scrollbar-track{
background:#111;
}

.poster-scroll::-webkit-scrollbar-thumb{
background:linear-gradient(#ff6a00,#ff9b3d);
border-radius:10px;
}

/* Image */

.poster-img{
width:100%;
height:auto;
display:block;
}

/* ===== Footer ===== */

footer{
border-top:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

background:linear-gradient(
to top,
rgba(0,0,0,0.92),
rgba(0,0,0,0.55)
);
}

.footer-wrap{
max-width:980px;
margin:auto;

padding:10px 16px 12px;

text-align:center;
font-size:12px;
opacity:.72;
}

/* ===== Mobile ===== */

@media(max-width:520px){

.header-title{
font-size:26px;
}

.header-tag{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="app">

<header>

<div class="header-wrap">

<div class="header-title">
Infinix Note 60 Pro
</div>

<div class="header-tag">
You Do Note
</div>

<div class="header-hint">
Scroll inside the mechanics
</div>

</div>

</header>

<main>

<div class="wrap">

<section class="poster-card">

<div class="poster-scroll">

<img
class="poster-img"
src="./FULLMECHANICS.png"
alt="Infinix Note 60 Pro Mechanics"
loading="eager">

</div>

</section>

</div>

</main>

<footer>

<div class="footer-wrap">
© Infinix Promo • Note 60 Pro Campaign
</div>

</footer>

</div>

</body>
</html>
