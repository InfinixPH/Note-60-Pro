<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infinix NOTE60Pro</title>

<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>

:root{
--accent:#ff6a00;
--accent2:#ff9b3d;
--card:rgba(10,10,10,0.85);
--border:rgba(255,255,255,0.12);
--radius:22px;
--shadow:0 26px 70px rgba(0,0,0,0.55);
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%}

/* ===== SOLAR GRADIENT BACKGROUND ===== */

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:#fff;

background:
radial-gradient(900px 520px at 70% 10%, rgba(255,220,140,0.45), transparent 62%),
radial-gradient(900px 600px at 25% 30%, rgba(255,140,0,0.35), transparent 60%),
radial-gradient(800px 700px at 55% 95%, rgba(255,90,0,0.22), transparent 65%),
linear-gradient(180deg,#0b0705,#050505,#000);

overflow:hidden;
}

/* ===== LAYOUT ===== */

.app{
height:100vh;
height:100dvh;
display:flex;
flex-direction:column;
}

/* ===== HEADER ===== */

header{
padding:16px 18px 10px;
}

.header-bar{
max-width:980px;
margin:0 auto;

display:flex;
justify-content:space-between;
align-items:flex-end;
}

/* LEFT */

.header-left{
display:flex;
flex-direction:column;
line-height:1;
}

.brand{
font-size:13px;
letter-spacing:1.2px;
opacity:.75;
}

.product{
font-size:26px;
font-weight:900;
margin-top:4px;
}

/* RIGHT */

.header-right{
display:flex;
flex-direction:column;
align-items:flex-end;
}

.tagline{
font-family:"MoonTime",cursive;
font-size:34px;
color:var(--accent2);
}

.hint{
font-size:10px;
opacity:.6;
margin-top:6px;
}

/* ===== MAIN ===== */

main{
flex:1;
display:flex;
justify-content:center;
padding:12px 18px 16px;
}

/* CONTAINER */

.container{
width:100%;
max-width:980px;
display:flex;
flex-direction:column;
}

/* POSTER CARD */

.poster-card{
flex:1;
border-radius:var(--radius);
overflow:hidden;
background:var(--card);
border:1px solid var(--border);
box-shadow:var(--shadow);
}

/* SCROLL */

.poster-scroll{
height:100%;
overflow-y:auto;
background:#000;

scrollbar-width:thin;
scrollbar-color:#ff6a00 rgba(255,255,255,0.15);
}

/* SCROLLBAR */

.poster-scroll::-webkit-scrollbar{
width:10px;
}

.poster-scroll::-webkit-scrollbar-track{
background:rgba(255,255,255,0.08);
}

.poster-scroll::-webkit-scrollbar-thumb{
background:linear-gradient(#ff6a00,#ffb15a);
border-radius:10px;
}

/* POSTER */

.poster-img{
width:100%;
display:block;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
padding:10px 14px 12px;
font-size:12px;
opacity:.6;
}

/* ===== MOBILE ===== */

@media(max-width:520px){

.product{
font-size:22px;
}

.tagline{
font-size:26px;
}

.hint{
font-size:9px;
}

main{
padding:8px 12px 12px;
}

}

</style>

</head>

<body>

<div class="app">

<header>

<div class="header-bar">

<div class="header-left">
<div class="brand">Infinix</div>
<div class="product">NOTE60Pro</div>
</div>

<div class="header-right">
<div class="tagline">You Do Note</div>
<div class="hint">scroll inside the mechanics</div>
</div>

</div>

</header>

<main>

<div class="container">

<div class="poster-card">

<div class="poster-scroll">

<img
class="poster-img"
src="./FULLMECHANICS.png"
alt="NOTE60Pro Mechanics">

</div>

</div>

</div>

</main>

<footer>
© Infinix Promo • NOTE60Pro Campaign
</footer>

</div>

</body>
</html>
