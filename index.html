<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infinix NOTE60Pro</title>

<link href="https://fonts.cdnfonts.com/css/hk-modular" rel="stylesheet">
<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>

:root{
--accent:#ff6a00;
--accent2:#ff9b3d;
--card:#0b0b0b;
--border:#1e1e1e;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:#fff;

background:
radial-gradient(circle at 70% 20%, rgba(255,110,0,0.25), transparent 40%),
radial-gradient(circle at 30% 80%, rgba(255,80,0,0.2), transparent 40%),
#000;

overflow:auto;
}

/* HEADER */

header{
text-align:center;
padding:30px 20px 10px;
}

.header-title{
font-size:36px;
font-weight:500;
letter-spacing:.5px;
}

.header-title span{
font-weight:900;
letter-spacing:1.5px;
}

.header-tag{
font-family:'MoonTime',cursive;
font-size:42px;
color:var(--accent2);
margin-top:4px;
}

.header-hint{
font-size:11px;
opacity:.6;
margin-top:4px;
}

/* MAIN */

main{
display:flex;
justify-content:center;
padding:16px;
}

.wrap{
width:100%;
max-width:900px;
position:relative;
}

/* POSTER CARD */

.poster-card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
overflow:hidden;
}

/* SCROLL */

.poster-scroll{
max-height:70vh;
overflow-y:auto;
background:#000;
}

/* SCROLLBAR */

.poster-scroll::-webkit-scrollbar{
width:10px;
}

.poster-scroll::-webkit-scrollbar-track{
background:#111;
}

.poster-scroll::-webkit-scrollbar-thumb{
background:linear-gradient(#ff6a00,#ff9b3d);
border-radius:10px;
}

/* POSTER IMAGE */

.poster-img{
width:100%;
display:block;
}

/* YUNA STANDEE */

.yuna{
position:fixed;
right:40px;
bottom:0;
height:420px;
pointer-events:none;
opacity:.95;
}

/* FOOTER */

footer{
text-align:center;
padding:10px;
font-size:12px;
opacity:.6;
}

/* MOBILE */

@media(max-width:768px){

.yuna{
height:260px;
right:10px;
}

.header-title{
font-size:28px;
}

.header-tag{
font-size:32px;
}

}

</style>

</head>

<body>

<header>

<div class="header-title">
Infinix <span>NOTE60Pro</span>
</div>

<div class="header-tag">
You Do Note
</div>

<div class="header-hint">
scroll inside the mechanics
</div>

</header>

<main>

<div class="wrap">

<div class="poster-card">

<div class="poster-scroll">

<img
class="poster-img"
src="FULLMECHANICS.png"
alt="NOTE60Pro Mechanics">

</div>

</div>

</div>

</main>

<footer>
© Infinix Promo • Note 60 Pro Campaign
</footer>

<img
class="yuna"
src="YUNA_STANDEE.png"
alt="Yuna Standee">

</body>
</html>
