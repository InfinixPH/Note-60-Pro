<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinix NOTE60Pro</title>

<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>

:root{
--accent:#ff6a00;
--accent2:#ff9b3d;
--card:#0e0e0e;
--border:#1e1e1e;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:#fff;

/* SOLAR GRADIENT BACKGROUND */
background:
radial-gradient(circle at 50% -20%, #ffb347 0%, #ff6a00 35%, #0d0d0d 70%),
linear-gradient(180deg,#000,#0a0a0a);

overflow:auto;
}

/* HERO SECTION */

.hero{
text-align:center;
padding:30px 20px 10px;
}

.hero img{
width:220px;
max-width:60%;
margin:0 auto 10px;
display:block;
}

.brand{
font-size:14px;
opacity:.8;
letter-spacing:2px;
}

.product{
font-size:34px;
font-weight:900;
margin-top:4px;
}

.tagline{
font-family:'MoonTime',cursive;
font-size:38px;
color:var(--accent2);
margin-top:6px;
}

.scroll-hint{
font-size:11px;
opacity:.6;
margin-top:6px;
}

/* MECHANICS */

main{
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
}

.poster-card{
background:var(--card);
border:1px solid var(--border);
border-radius:24px;
overflow:hidden;
box-shadow:0 30px 60px rgba(0,0,0,.6);
}

.poster-scroll{
max-height:70vh;
overflow-y:auto;
background:#000;
}

/* SCROLLBAR */

.poster-scroll::-webkit-scrollbar{
width:10px;
}

.poster-scroll::-webkit-scrollbar-track{
background:#111;
}

.poster-scroll::-webkit-scrollbar-thumb{
background:linear-gradient(#ff6a00,#ff9b3d);
border-radius:10px;
}

.poster-img{
width:100%;
display:block;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
font-size:12px;
opacity:.6;
}

/* DESKTOP ADJUST */

@media(min-width:900px){

.hero{
padding-top:50px;
}

.hero img{
width:260px;
}

.product{
font-size:42px;
}

.tagline{
font-size:46px;
}

.poster-scroll{
max-height:75vh;
}

}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero">

<img src="YUNA_STANDEE.png" alt="Yuna Standee">

<div class="brand">Infinix</div>

<div class="product">NOTE60Pro</div>

<div class="tagline">You Do Note</div>

<div class="scroll-hint">scroll inside the mechanics</div>

</section>

<!-- MECHANICS -->

<main>

<div class="container">

<div class="poster-card">

<div class="poster-scroll">

<img
class="poster-img"
src="FULLMECHANICS.png"
alt="NOTE60Pro Mechanics">

</div>

</div>

</div>

</main>

<footer>
© Infinix Promo • NOTE60Pro Campaign
</footer>

</body>
</html>
