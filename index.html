<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinix NOTE60Pro</title>

<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>
:root{
  --accent:#ff6a00;
  --accent2:#ff9b3d;
  --card:#0c0c0c;
  --border:#1d1d1d;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at 80% 20%, rgba(255,120,0,0.25), transparent 40%),
    radial-gradient(circle at 20% 90%, rgba(255,80,0,0.2), transparent 40%),
    #000;
  overflow:auto;
}

/* ===== HEADER (COMPACT, LEFT/RIGHT) ===== */
header{
  padding:16px 18px 10px;
}

.header-bar{
  max-width:950px;
  margin:0 auto;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:14px;
}

.header-left{
  display:flex;
  flex-direction:column;
  line-height:1;
}

.header-brand{
  font-size:14px;
  opacity:.75;
  letter-spacing:1.4px;
}

.header-product{
  font-size:28px;
  font-weight:900;
  letter-spacing:.8px;
  margin-top:4px;
}

.header-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  text-align:right;
  line-height:1;
}

.header-tag{
  font-family:'MoonTime',cursive;
  font-size:34px;
  color:var(--accent2);
  text-shadow:0 0 18px rgba(255,120,0,0.22);
}

.header-hint{
  margin-top:6px;
  font-size:10px;
  opacity:.55;
  letter-spacing:.2px;
}

/* ===== MAIN ===== */
main{
  display:flex;
  justify-content:center;
  padding:12px 18px 18px;
}

.container{
  width:100%;
  max-width:950px;
  position:relative;
}

/* ===== POSTER CARD ===== */
.poster-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 30px 60px rgba(0,0,0,.7);
}

.poster-scroll{
  max-height:78vh;   /* more space for poster */
  overflow-y:auto;
  background:#000;
  padding-right:64px; /* reserve space so Yuna doesn't cover mechanics text */
}

/* visible scrollbar */
.poster-scroll::-webkit-scrollbar{ width:10px; }
.poster-scroll::-webkit-scrollbar-track{ background:#111; }
.poster-scroll::-webkit-scrollbar-thumb{
  background:linear-gradient(#ff6a00,#ff9b3d);
  border-radius:10px;
}
.poster-img{ width:100%; display:block; }

/* ===== YUNA (NOT BLOCKING) =====
   Place Yuna OUTSIDE the card, pinned to the right,
   and keep it away from the poster text via padding-right above.
*/
.yuna{
  position:absolute;
  right:-70px;
  bottom:-10px;
  height:400px;
  pointer-events:none;
  opacity:.92;
  filter:drop-shadow(0 20px 40px rgba(0,0,0,0.6));
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:12px 16px 16px;
  font-size:12px;
  opacity:.6;
}

/* ===== MOBILE ===== */
@media (max-width:768px){
  header{ padding:14px 14px 8px; }
  .header-product{ font-size:22px; }
  .header-tag{ font-size:28px; }
  main{ padding:10px 14px 16px; }

  .yuna{
    height:260px;
    right:-25px;
    opacity:.82;
  }

  .poster-scroll{
    padding-right:42px; /* still reserve space on mobile */
    max-height:76vh;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-bar">
    <div class="header-left">
      <div class="header-brand">Infinix</div>
      <div class="header-product">NOTE60Pro</div>
    </div>

    <div class="header-right">
      <div class="header-tag">You Do Note</div>
      <div class="header-hint">scroll inside the mechanics</div>
    </div>
  </div>
</header>

<main>
  <div class="container">

    <div class="poster-card">
      <div class="poster-scroll">
        <img class="poster-img" src="FULLMECHANICS.png" alt="NOTE60Pro Mechanics">
      </div>
    </div>

    <!-- Yuna on the right, outside the mechanics area -->
    <img class="yuna" src="YUNA_STANDEE.png" alt="Yuna Standee">

  </div>
</main>

<footer>© Infinix Promo • NOTE60Pro Campaign</footer>

</body>
</html>
