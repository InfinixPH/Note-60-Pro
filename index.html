<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infinix NOTE60Pro</title>

<link href="https://db.onlinewebfonts.com/c/657bc16f9d9e1138aedc238e69ff1983?family=MoonTime" rel="stylesheet">

<style>

:root{
--accent:#ff6a00;
--accent2:#ff9b3d;
--card:rgba(10,10,10,0.9);
--border:rgba(255,255,255,0.12);
--radius:22px;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
height:100%;
}

/* SOLAR BACKGROUND */

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:#fff;

background:
radial-gradient(circle at 70% 10%, rgba(255,200,120,0.45), transparent 60%),
radial-gradient(circle at 20% 80%, rgba(255,120,0,0.35), transparent 60%),
linear-gradient(180deg,#0b0705,#000);

overflow:hidden;
}

/* APP */

.app{
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
padding:14px 18px;
}

.header-bar{
max-width:980px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:flex-end;
}

/* LEFT */

.brand{
font-size:13px;
letter-spacing:1px;
opacity:.7;
}

.product{
font-size:26px;
font-weight:900;
margin-top:3px;
}

/* RIGHT */

.header-right{
text-align:right;
}

.tagline{
font-family:"MoonTime",cursive;
font-size:32px;
color:var(--accent2);
}

.hint{
font-size:10px;
opacity:.6;
margin-top:4px;
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
padding:12px 16px;
}

/* CONTAINER */

.container{
width:100%;
max-width:950px;
display:flex;
flex-direction:column;
}

/* POSTER */

.poster-card{
flex:1;
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
overflow:hidden;
}

/* SCROLL */

.poster-scroll{
height:100%;
overflow-y:auto;
background:#000;
}

/* SCROLLBAR */

.poster-scroll::-webkit-scrollbar{
width:10px;
}

.poster-scroll::-webkit-scrollbar-track{
background:#111;
}

.poster-scroll::-webkit-scrollbar-thumb{
background:linear-gradient(#ff6a00,#ff9b3d);
border-radius:10px;
}

/* IMAGE */

.poster-img{
width:100%;
display:block;
}

/* FOOTER */

footer{
text-align:center;
padding:10px;
font-size:12px;
opacity:.6;
}

/* MOBILE */

@media(max-width:520px){

.product{
font-size:22px;
}

.tagline{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="app">

<header>

<div class="header-bar">

<div>
<div class="brand">Infinix</div>
<div class="product">NOTE60Pro</div>
</div>

<div class="header-right">
<div class="tagline">You Do Note</div>
<div class="hint">scroll inside the mechanics</div>
</div>

</div>

</header>

<main>

<div class="container">

<div class="poster-card">

<div class="poster-scroll">

<img
class="poster-img"
src="FULLMECHANICS.png"
alt="NOTE60Pro Mechanics">

</div>

</div>

</div>

</main>

<footer>
© Infinix Promo • NOTE60Pro Campaign
</footer>

</div>

</body>
</html>
