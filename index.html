<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infinix Note 60 Pro – You Do Note</title>

<style>

:root{
--accent:#ff6a00;
--accent2:#ff9b3d;
--bg:#050505;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.15);
--radius:20px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
height:100%;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:white;
overflow:hidden;
}

/* =========================
BACKGROUND
========================= */

body{

background:
radial-gradient(circle at 20% 10%, rgba(255,120,0,0.35), transparent 50%),
radial-gradient(circle at 80% 20%, rgba(255,90,0,0.35), transparent 60%),
linear-gradient(180deg,#000,#050505);

animation: glowMove 10s infinite alternate ease-in-out;
}

@keyframes glowMove{

0%{
background-position:0% 0%;
}

100%{
background-position:40% 20%;
}

}

/* =========================
APP LAYOUT
========================= */

.app{
height:100vh;
height:100dvh;
display:flex;
flex-direction:column;
}

/* =========================
HEADER
========================= */

header{

position:sticky;
top:0;
backdrop-filter:blur(18px);

background:linear-gradient(
to bottom,
rgba(0,0,0,0.9),
rgba(0,0,0,0.6)
);

border-bottom:1px solid rgba(255,255,255,0.08);
z-index:10;
}

.header-wrap{

max-width:980px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

padding:16px;
}

.header-title{

font-weight:800;
font-size:16px;
letter-spacing:0.5px;
}

.header-tag{

font-size:12px;
color:var(--accent2);
}

/* =========================
MAIN
========================= */

main{

flex:1;
display:flex;
justify-content:center;
align-items:center;

padding:16px;
}

.wrap{

width:100%;
max-width:980px;
height:100%;
}

/* =========================
POSTER CARD
========================= */

.poster-card{

height:100%;

background:var(--card);
border:1px solid var(--border);

border-radius:var(--radius);

backdrop-filter:blur(14px);

box-shadow:
0 30px 80px rgba(0,0,0,0.8),
0 0 60px rgba(255,110,0,0.25);

overflow:hidden;

display:flex;
flex-direction:column;
}

/* =========================
SCROLL AREA
========================= */

.poster-scroll{

flex:1;

overflow-y:auto;
overflow-x:hidden;

scrollbar-width:none;
-ms-overflow-style:none;

background:black;
}

.poster-scroll::-webkit-scrollbar{
display:none;
}

.poster-img{

width:100%;
height:auto;
display:block;
}

/* =========================
FOOTER
========================= */

footer{

border-top:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

background:linear-gradient(
to top,
rgba(0,0,0,0.9),
rgba(0,0,0,0.6)
);
}

.footer-wrap{

max-width:980px;
margin:auto;

text-align:center;

padding:10px;

font-size:12px;
opacity:.7;
}

/* =========================
MOBILE
========================= */

@media(max-width:520px){

.header-title{
font-size:14px;
}

main{
padding:12px;
}

}

</style>

</head>

<body>

<div class="app">

<header>

<div class="header-wrap">

<div class="header-title">
Infinix Note 60 Pro
</div>

<div class="header-tag">
You Do Note
</div>

</div>

</header>

<main>

<div class="wrap">

<section class="poster-card">

<div class="poster-scroll">

<img
class="poster-img"
src="./FULLMECHANICS.PNG"
alt="Note 60 Pro Mechanics"
loading="eager">

</div>

</section>

</div>

</main>

<footer>

<div class="footer-wrap">
© Infinix Promo • Note 60 Pro Campaign
</div>

</footer>

</div>

</body>
</html>
